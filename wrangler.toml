name = "anixops-api-auth"
main = "src/index-with-auth.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[dev]
port = 8787
local_protocol = "http"

[vars]
ENVIRONMENT = "production"
JWT_EXPIRE = "86400"

[[routes]]
pattern = "api.anixops.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "anixops-db"
database_id = "1fd85576-c08d-44f3-a0fb-ec5fc845f1e5"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "35a39ccc4cea47e89aa8b1459f85e1cf"

[[r2_buckets]]
binding = "R2"
bucket_name = "anixops-files"

[ai]
binding = "AI"