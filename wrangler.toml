name = "anixops-control-center-workers-sandbox-app"
main = "dist/index.mjs"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
ENVIRONMENT = "production"
JWT_EXPIRE = "86400"
APP_VERSION = "1.0.0"
BUILD_SHA = "dev"

[[routes]]
pattern = "api.anixops.com"
custom_domain = true

[[tail_consumers]]
service = "anixops-control-center-workers-tail"

[[d1_databases]]
binding = "DB"
database_name = "anixops-db"
database_id = "1fd85576-c08d-44f3-a0fb-ec5fc845f1e5"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "35a39ccc4cea47e89aa8b1459f85e1cf"

[[r2_buckets]]
binding = "R2"
bucket_name = "anixops-files"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "anixops_control_center"

[ai]
binding = "AI"
